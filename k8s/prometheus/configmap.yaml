apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: recipica
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files: []
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      - job_name: backend
        static_configs:
          - targets: ['backend:5000']
      - job_name: alertmanager
        static_configs:
          - targets: ['alertmanager:9093']
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

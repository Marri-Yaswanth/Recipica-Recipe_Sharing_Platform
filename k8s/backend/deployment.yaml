apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: recipica
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: yaswanth2408/recipica-backend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: DB_NAME
            - name: DB_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: DB_PROVIDER
            - name: USE_SUPABASE
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: USE_SUPABASE
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: recipica-config
                  key: CLIENT_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: recipica-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipica-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recipica-secrets
                  key: JWT_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: recipica-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recipica-secrets
                  key: EMAIL_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20

name: Deploy - Azure Container Instances / App Service

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Docker - Build & Push to Hub"]
    types: [completed]
    branches: [main]

jobs:
  deploy-azure:
    runs-on: ubuntu-latest
    name: Deploy to Azure
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: production-azure
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/recipica-backend:latest

      - name: Deploy frontend to Azure App Service / Static Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/recipica-frontend:latest

      - name: Verify Azure deployments
        run: |
          az webapp show -g ${{ secrets.AZURE_RESOURCE_GROUP }} -n ${{ secrets.AZURE_BACKEND_APP_NAME }}
          az webapp show -g ${{ secrets.AZURE_RESOURCE_GROUP }} -n ${{ secrets.AZURE_FRONTEND_APP_NAME }}

      - name: Health check
        run: |
          echo "Waiting for services to be healthy..."
          sleep 10
          curl -f https://${{ secrets.AZURE_BACKEND_APP_NAME }}.azurewebsites.net/api/health || echo "Backend health check pending"
          curl -f https://${{ secrets.AZURE_FRONTEND_APP_NAME }}.azurewebsites.net || echo "Frontend health check pending"

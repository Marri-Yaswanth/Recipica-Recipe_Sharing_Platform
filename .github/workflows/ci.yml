name: CI/CD Pipeline - Recipica Recipe Sharing Platform

on:
  push:
    branches: [main, master]
    paths:
      - frontend/**
      - backend/**
      - .github/workflows/**
  pull_request:
    branches: [main, master]
    paths:
      - frontend/**
      - backend/**
  workflow_dispatch:

env:
  REGISTRY: docker.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and push frontend
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (if credentials available)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          load: ${{ secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == '' }}
          tags: |
            recipica-frontend:latest
            recipica-frontend:${{ github.sha }}

      - name: Frontend Build Status
        run: echo "✅ Frontend image built successfully"

  # Build and push backend
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (if credentials available)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          load: ${{ secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == '' }}
          tags: |
            recipica-backend:latest
            recipica-backend:${{ github.sha }}

      - name: Backend Build Status
        run: echo "✅ Backend image built successfully"

  # Deploy to Kubernetes (conditional - only if EC2 credentials are configured)
  deploy:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.EC2_SSH_KEY != '' && secrets.EC2_HOST != '' && secrets.EC2_USER != '' }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2 kubeadm cluster
        run: |
          echo "🚀 Deploying to Kubernetes cluster..."

          ssh -T -i ~/.ssh/ec2_key.pem \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o ConnectTimeout=10 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash -se" << 'EOF'

            set -e

            echo "Updating frontend deployment..."
            kubectl set image deployment/frontend frontend=recipica-frontend:latest -n recipica 2>/dev/null || echo "⚠️  Frontend deployment not found, skipping..."

            echo "Updating backend deployment..."
            kubectl set image deployment/backend backend=recipica-backend:latest -n recipica 2>/dev/null || echo "⚠️  Backend deployment not found, skipping..."

            echo "Checking Kubernetes cluster status..."
            kubectl get pods -n recipica 2>/dev/null || echo "⚠️  Namespace 'recipica' not found"

            echo "✅ Deployment completed"

          EOF
  build-summary:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: CI/CD Pipeline Summary
        run: |
          echo "═══════════════════════════════════════════"
          echo "✅ Recipica CI/CD Pipeline"
          echo "═══════════════════════════════════════════"
          echo ""
          echo "📦 Docker Images Built:"
          echo "   - recipica-frontend:latest"
          echo "   - recipica-frontend:${{ github.sha }}"
          echo "   - recipica-backend:latest"
          echo "   - recipica-backend:${{ github.sha }}"
          echo ""
          echo "🔧 Configuration Status:"
          echo "   - Docker Hub: ${{ secrets.DOCKERHUB_USERNAME != '' && '✅ Configured' || '⏭️  Skip push' }}"
          echo "   - Kubernetes: ${{ secrets.EC2_HOST != '' && '✅ Configured' || '⏭️  Skip deploy' }}"
          echo ""
          echo "For full CI/CD capabilities, add these GitHub secrets:"
          echo "   • DOCKERHUB_USERNAME"
          echo "   • DOCKERHUB_TOKEN"
          echo "   • EC2_SSH_KEY"
          echo "   • EC2_HOST"
          echo "   • EC2_USER"
          echo ""
          echo "═══════════════════════════════════════════"

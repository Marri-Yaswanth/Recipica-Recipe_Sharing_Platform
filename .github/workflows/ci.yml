name: CI/CD Pipeline - Recipica Recipe Sharing Platform

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/recipica-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/recipica-backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and push frontend
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          build-args: |
            REACT_APP_API_BASE=${{ vars.REACT_APP_API_BASE || 'http://localhost:8081' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # Build and push backend
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deployment Summary
        run: |
          echo "🚀 CI/CD Pipeline Completed Successfully!"
          echo ""
          echo "📦 Docker Images Built and Pushed:"
          echo "   • Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "   • Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo "   • Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "   • Backend: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo ""
          echo "🔄 Automated deployment commands executed:"
          echo "   kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:latest -n recipica"
          echo "   kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:latest -n recipica"

  # Deploy to Kubernetes (automated deployment to kubeadm)
  deploy:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 kubeadm cluster
        run: |
          echo "🚀 Deploying to Kubernetes..."

          ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            set -e

            echo "🚀 Updating frontend deployment..."
            kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n recipica

            echo "🔄 Updating backend deployment..."
            kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n recipica

            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment/frontend -n recipica --timeout=300s
            kubectl rollout status deployment/backend -n recipica --timeout=300s

            echo "📊 Final Status:"
            kubectl get pods -n recipica

            echo "✅ Deployment SUCCESS"

          EOF

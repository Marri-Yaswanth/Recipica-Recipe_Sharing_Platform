name: CI/CD Pipeline - Recipica App

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE: yaswanth2408/frontend
  BACKEND_IMAGE: yaswanth2408/backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and push frontend
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # Build and push backend
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deployment Summary
        run: |
          echo "CI/CD Pipeline Completed Successfully!"
          echo ""
          echo "Docker Images Built and Pushed:"
          echo "   - Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "   - Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo "   - Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "   - Backend: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo ""
          echo "Automated deployment commands executed:"
          echo "   kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:latest -n recipica"
          echo "   kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:latest -n recipica"

  # Deploy to Kubernetes (automated deployment to kubeadm)
  deploy:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "Missing secret: EC2_HOST" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Missing secret: EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing secret: EC2_SSH_KEY" && exit 1)

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 kubeadm cluster
        run: |
          echo "Deploying to Kubernetes..."

          ssh -T -i ~/.ssh/ec2_key.pem \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "FRONTEND_IMAGE='${{ env.FRONTEND_IMAGE }}' BACKEND_IMAGE='${{ env.BACKEND_IMAGE }}' GITHUB_SHA='${{ github.sha }}' bash -se" << 'EOF'

            set -e

            echo "Updating frontend deployment..."
            kubectl set image deployment/frontend frontend=${FRONTEND_IMAGE}:${GITHUB_SHA} -n recipica

            echo "Updating backend deployment..."
            kubectl set image deployment/backend backend=${BACKEND_IMAGE}:${GITHUB_SHA} -n recipica

            echo "Waiting for rollout..."
            kubectl rollout status deployment/frontend -n recipica --timeout=300s
            kubectl rollout status deployment/backend -n recipica --timeout=300s

            echo "Final Status:"
            kubectl get pods -n recipica

            echo "Deployment SUCCESS"

          EOF

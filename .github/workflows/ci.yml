name: CI/CD Pipeline - Food Delivery App

on:
  push:
    branches: [main, master]
    paths:
      - frontend/**
      - backend/**
      - .github/workflows/**
  pull_request:
    branches: [main, master]
    paths:
      - frontend/**
      - backend/**
  workflow_dispatch:

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE: yaswanth2408/frontend
  BACKEND_IMAGE: yaswanth2408/backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and push frontend
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # Build and push backend
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deployment Summary
        run: |
          echo "CI/CD Pipeline Completed Successfully!"
          echo ""
          echo "Docker Images Built and Pushed:"
          echo "   - Frontend: yaswanth2408/frontend:latest"
          echo "   - Frontend: yaswanth2408/frontend:${{ github.sha }}"
          echo "   - Backend: yaswanth2408/backend:latest"
          echo "   - Backend: yaswanth2408/backend:${{ github.sha }}"
          echo ""
          echo "Automated deployment commands executed:"
          echo "   kubectl set image deployment/frontend frontend=yaswanth2408/frontend:latest -n food-delivery"
          echo "   kubectl set image deployment/backend backend=yaswanth2408/backend:latest -n food-delivery"

  # Deploy to Kubernetes (automated deployment to kubeadm)
  deploy:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 kubeadm cluster
        run: |
          echo "Deploying to Kubernetes..."

          ssh -T -i ~/.ssh/ec2_key.pem \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "FRONTEND_IMAGE='${{ env.FRONTEND_IMAGE }}' BACKEND_IMAGE='${{ env.BACKEND_IMAGE }}' bash -se" << 'EOF'

            set -e

            echo "Updating frontend deployment..."
            kubectl set image deployment/frontend frontend=${FRONTEND_IMAGE}:latest -n food-delivery

            echo "Updating backend deployment..."
            kubectl set image deployment/backend backend=${BACKEND_IMAGE}:latest -n food-delivery

            echo "Waiting for rollout..."
            kubectl rollout status deployment/frontend -n food-delivery --timeout=300s
            kubectl rollout status deployment/backend -n food-delivery --timeout=300s

            echo "Final Status:"
            kubectl get pods -n food-delivery

            echo "Deployment SUCCESS"

          EOF
